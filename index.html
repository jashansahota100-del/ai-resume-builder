<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium AI Resume Builder</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<div class="main-card">

  <h1>Premium AI Resume Builder</h1>
  <p>Create luxury resumes in seconds</p>

  <button onclick="startBuilding()">Start Building</button>

  <div id="formSection">

    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="role" placeholder="Job Role">
    <textarea id="skills" placeholder="Skills (comma separated)"></textarea>
    <textarea id="experience" placeholder="Experience"></textarea>

    <button onclick="generateResume()">Generate Resume</button>
    <button onclick="aiFeature()">Generate AI Summary (Premium)</button>
    <button onclick="downloadPDF()">Download PDF</button>

    <div id="preview" class="preview-card"></div>

  </div>

</div>

<script src="main.js"></script>

</body>
</html>
